// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.0'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}



tasks.withType(JavaCompile).configureEach {
    doFirst {
        def licenseDir = new File("${android.sdkDirectory}/licenses")
        if (!licenseDir.exists()) licenseDir.mkdirs()
        def licenseFile = new File(licenseDir, "android-sdk-license")
        if (!licenseFile.exists()) {
            licenseFile.write("89354d86b503674d82bfa0c0c1753e206a2a4333\n24333f1a0b3b825da7e9c7051de3a0fc465c2f3d")
        }
    }
}

